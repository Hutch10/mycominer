name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-do-not-ship
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run type-check

      - run: npm test

      - run: npm run build
        env:
          NODE_ENV: production
          MYCOMINER_GIT_COMMIT: ${{ github.sha }}
          MYCOMINER_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          MYCOMINER_MIGRATION_VERSION: '008'
          MYCOMINER_RELEASE_CHANNEL: release-candidate

      - name: Scan production build for server-only secrets
        run: node scripts/scan-client-secrets.mjs
        env:
          NODE_ENV: production
